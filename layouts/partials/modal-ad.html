<!-- Modal Ad - 全画面バナー広告 -->
<style>
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 9998;
    animation: modalFadeIn 0.3s ease;
  }
  .modal-ad {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: center;
  }
  .modal-ad img { max-width: 280px; width: 100%; height: auto; }
  .modal-close {
    position: absolute;
    top: -8px; right: -8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    z-index: 10;
    display: none;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .modal-close.show {
    display: flex;
    opacity: 0.4;
  }
  .modal-close:hover { opacity: 0.8; }
  .modal-close svg { width: 10px; height: 10px; }
  .modal-backdrop.modal-hidden,
  .modal-ad.modal-hidden { display: none; }
  @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalSlideUp { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }
</style>

<div class="modal-backdrop" id="modalBackdrop"></div>
<div class="modal-ad" id="modalAd">
  <button class="modal-close" id="modalClose" onclick="closeModalAd()" aria-label="閉じる">
    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round">
      <line x1="7" y1="7" x2="17" y2="17"/><line x1="17" y1="7" x2="7" y2="17"/>
    </svg>
  </button>
  <a href="https://px.a8.net/svt/ejp?a8mat=4AZE01+4P34KY+3NEK+C164X" rel="nofollow" target="_blank">
    <img border="0" width="250" height="250" alt="" src="https://www22.a8.net/svt/bgt?aid=260311969284&wid=001&eno=01&mid=s00000017030002021000&mc=1">
  </a>
  <img border="0" width="1" height="1" src="https://www11.a8.net/0.gif?a8mat=4AZE01+4P34KY+3NEK+C164X" alt="" style="display:none;">
</div>
<script>
// ×ボタンを3秒後にフェードイン表示
setTimeout(function(){
  var btn = document.getElementById('modalClose');
  if(btn) btn.classList.add('show');
}, 3000);
function closeModalAd() {
  document.getElementById('modalBackdrop').classList.add('modal-hidden');
  document.getElementById('modalAd').classList.add('modal-hidden');
}
</script>
