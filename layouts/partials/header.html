<header class="site-header">
  <div class="header-inner container">
    <a href="{{ .Site.BaseURL }}" class="site-logo">
      <h1>{{ .Site.Title }}</h1>
    </a>
    <nav class="main-nav">
      <button class="nav-toggle" aria-label="メニュー">☰</button>
      <ul class="nav-menu">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
