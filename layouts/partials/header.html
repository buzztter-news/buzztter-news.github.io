<header class="site-header">
  <div class="header-inner container">
    <a href="{{ .Site.BaseURL }}" class="site-logo">
      <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#e53935"/>
        <path d="M7 8h14v2H7zM7 13h10v2H7zM7 18h12v2H7z" fill="#fff"/>
      </svg>
      <span class="logo-text">buzzter <span class="logo-accent">news</span></span>
    </a>
    <nav class="main-nav">
      <button class="nav-toggle" aria-label="メニュー">☰</button>
      <ul class="nav-menu">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
