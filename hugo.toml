baseURL = "https://manatofujii-png.github.io/"
languageCode = "ja"
title = "トレンドニュースまとめ"
theme = ""
paginate = 12
enableRobotsTXT = true

[params]
  description = "知恵袋やSNSで話題のトレンドニュースをわかりやすくまとめるメディア"
  author = "編集部"
  # Google Analytics ID（後で設定）
  # googleAnalytics = "G-XXXXXXXXXX"

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[menu]
  [[menu.main]]
    name = "芸能・エンタメ"
    url = "/categories/芸能・エンタメ/"
    weight = 1
  [[menu.main]]
    name = "スポーツ"
    url = "/categories/スポーツ/"
    weight = 2
  [[menu.main]]
    name = "社会・政治"
    url = "/categories/社会・政治/"
    weight = 3
  [[menu.main]]
    name = "IT・テクノロジー"
    url = "/categories/it・テクノロジー/"
    weight = 4
  [[menu.main]]
    name = "生活・雑学"
    url = "/categories/生活・雑学/"
    weight = 5
